name: CI

on:
  push:
    branches: [main]
  pull_request:

# Windows and Linux webview builds wait until we can test those targets
# (see AGENTS.md, Session 9). For now CI covers macOS only.
jobs:
  build-macos:
    name: Test & build (macOS)
    runs-on: macos-14
    env:
      # Pinned Wails v3 alpha: the core API is stable but the tooling moves —
      # bump deliberately after reading the changelog (AGENTS.md, Risk 1).
      WAILS_VERSION: v3.0.0-alpha2.117
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Test core (framework-agnostic)
        run: go test -race ./internal/...

      - name: Vet
        run: go vet ./internal/... ./cmd/... ./frontend/...

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Doctor
        run: wails3 doctor

      - name: Build desktop app
        run: wails3 task build

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: reliure-macos-arm64
          path: bin/reliure
          if-no-files-found: error
